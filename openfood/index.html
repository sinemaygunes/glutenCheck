<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Food Facts Search</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="main-container">
      <h1>Open Food Facts Search</h1>

      <div class="search-container">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Enter barcode or product name" />
        </div>
        <div class="search-buttons">
          <button onclick="searchByBarcode()" id="barcodeButton">Search by Barcode</button>
          <button onclick="searchByName()" id="nameButton">Search by Name</button>
          <button onclick="showFavorites()" id="favoritesButton" class="favorites-btn">♥ Favorites</button>
        </div>
      </div>

      <div id="loadingSpinner"></div>

      <div class="recent-searches">
        <h3>Recent Searches</h3>
        <div id="recentSearchesList"></div>
      </div>

      <div id="searchResults"></div>

      <!-- Product info card will be rendered dynamically by JS -->
    </div>

    <!-- Modal -->
    <div id="productModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modalProductName"></h2>
          <button class="close-modal">×</button>
        </div>
        <div class="modal-body">
          <div class="product-image-container">
            <img id="modalProductImage" alt="Product Image" />
          </div>
          <div class="product-details">
            <div class="detail-row">
              <strong>Brand:</strong>
              <span id="modalBrand"></span>
            </div>
            <div class="detail-row">
              <strong>Category:</strong>
              <span id="modalCategory"></span>
            </div>
            <div class="detail-row">
              <strong>Barcode:</strong>
              <span id="modalBarcode"></span>
            </div>
            <div class="detail-row">
              <strong>Gluten Status:</strong>
              <span id="modalGlutenStatus"></span>
            </div>
            <div class="detail-row allergens-row">
              <strong>Allergens:</strong>
              <span id="modalAllergens"></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Load API functions first -->
    <script src="api.js"></script>
    <!-- Then load the main app -->
    <script src="app.js"></script>
  </body>
</html>
